<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas no HTML</title>
</head>

<body>
    <main>
        <h1>Tabelas no HTML</h1>
        <section id="Pokemons">
            <h2>Tabelas de pokémons</h2>

            <!--Tabela-->
            <table border="20">

                <!--Cabeçalho-->
                <thead>
                    <!--Linha-->
                    <tr>
                        <th>Nome</th>
                        <th>Cor</th>

                    </tr>

                </thead>

                <!--Corpo-->
                <tbody>
                    <tr>
                        <td>Bulbasaur</td>
                        <td>Verde</td>
                    </tr>
                    <tr>
                        <td>Chikorita</td>
                        <td>Verde</td>
                    </tr>
                    <tr>
                        <td>Treecko</td>
                        <td>Verde</td>
                    </tr>
                    <tr>
                        <td>Snivy</td>
                        <td>Verde</td>
                    </tr>
                    <tr>
                        <td>Rowlet</td>
                        <td>Marrom e Verde</td>
                    </tr>

                </tbody>

            </table>
        </section>

        <section id="Tipagens">
            <h2>Tabelas de tipos</h2>
            <table border="20">

                <thead>
                    <tr>
                        <th>Tipo</th>
                        <th>Símbolo</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Fogo</td>
                        <td>vermelho</td>
                    </tr>

                    <tr>
                        <td>Água</td>
                        <td>azul</td>
                    </tr>

                    <tr>
                        <td rowspan="2">Grama</td>
                        <td>verde</td>
                    </tr>

                    <tr>
                    
                        <td>verde</td>
                    </tr>
                </tbody>
            </table>

        </section>
    </main>
</body>

</html>
